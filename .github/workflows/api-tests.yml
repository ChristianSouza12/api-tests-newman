name: API Tests Newman

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  newman-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o repositório
        uses: actions/checkout@v5

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Newman e reporter HTML
        run: npm install -g newman newman-reporter-htmlextra

      - name: Rodar collection com relatório
        run: newman run collection.json -e environment.json -r cli,htmlextra --reporter-htmlextra-export newman-report.html

      - name: Salvar relatório como artefato
        uses: actions/upload-artifact@v4
        with:
          name: newman-report
          path: newman-report.html